<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mulțumim pentru cerere — Latte.ro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0D0D0D;
    color: #FFFCFA;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .container {
    max-width: 720px;
    width: 100%;
    text-align: center;
  }
  .check {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #52C4B6;
    display: inline-grid;
    place-items: center;
    margin-bottom: 32px;
  }
  .check svg { width: 40px; height: 40px; }
  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    color: #52C4B6;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  h2 {
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 600;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .video-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 32px;
    border: 1px solid rgba(255,252,250,.1);
  }
  .video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .message {
    font-size: 1.1rem;
    color: rgba(255,252,250,.7);
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .btn {
    display: inline-block;
    padding: 16px 40px;
    background: #52C4B6;
    color: #0D0D0D;
    font-weight: 600;
    font-size: 1rem;
    border-radius: 12px;
    text-decoration: none;
    transition: background .2s;
  }
  .btn:hover { background: #3fb0a3; }
  .logo {
    margin-top: 60px;
    font-size: 1.5rem;
    font-weight: 700;
    color: rgba(255,252,250,.3);
  }
  .logo span { color: #52C4B6; }
</style>
</head>
<body>
  <div class="container">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Success!</h1>
    <h2>Mulțumim pentru cerere</h2>
    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/xYZ7dX9n5k8?rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
        title="Prezentare Latte"
      ></iframe>
    </div>
    <p class="message">O să vă contactăm în curând pentru a vă oferi mai multe detalii.</p>
    <a href="/landing/" class="btn">Revino la pagina principală</a>
    <div class="logo">latte<span>.</span>ro</div>
  </div>
</body>
</html>
