<style>
:root {
  --turq: #52C4B6;
  --turq-deep: #2FA89A;
  --offwhite: #FFFCFA;
  --yellow: #FFFC9C;
  --peach: #FFB878;
  --ink: #1D1D1C;
  --ink-soft: #2B2B29;
  --line: #1D1D1C14;
  --line-2: #1D1D1C0A;
  --mute: #6B6B68;
  --shadow-1: 0 1px 2px rgba(29,29,28,.06), 0 12px 32px -16px rgba(29,29,28,.18);
  --shadow-2: 0 1px 2px rgba(29,29,28,.06), 0 24px 60px -24px rgba(29,29,28,.25);
  --r-card: 20px;
  --r-soft: 14px;
  --r-pill: 999px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Manrope', system-ui, sans-serif;
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--offwhite);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.display { font-family: 'Bricolage Grotesque', 'Manrope', sans-serif; font-weight: 700; letter-spacing: -0.02em; line-height: 0.95; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.num { font-family: 'Bricolage Grotesque', sans-serif; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; letter-spacing: -0.04em; }

.dot {
  display: inline-block; width: 0.42em; height: 0.42em; background: var(--turq);
  border-radius: 999px; vertical-align: 0.18em; margin-right: 0.1em;
}

a { color: inherit; }
button { font-family: inherit; cursor: pointer; }

.wrap { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
@media (max-width: 720px) { .wrap { padding: 0 20px; } }

/* CTA */
.btn {
  display: inline-flex; align-items: center; gap: 10px; padding: 16px 26px;
  border-radius: var(--r-pill); font-weight: 600; font-size: 16px;
  border: 1px solid transparent; transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
  text-decoration: none; white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--offwhite); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-2); }
.btn-turq { background: var(--turq); color: var(--ink); }
.btn-turq:hover { background: #46b3a6; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--ink); border-color: rgba(29,29,28,.18); }
.btn-ghost:hover { background: var(--ink); color: var(--offwhite); }
.btn-arrow { transition: transform .2s ease; }
.btn:hover .btn-arrow { transform: translate(2px,-2px); }

.eyebrow {
  display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); padding: 6px 12px;
  background: rgba(29,29,28,.06); border-radius: 999px;
}
.eyebrow.light { background: rgba(255,252,250,.14); color: var(--offwhite); }

/* Section spacing */
section { padding: 96px 0; position: relative; }
@media (max-width: 720px) { section { padding: 64px 0; } }

h1.display { font-size: clamp(48px, 8vw, 112px); }
h2.display { font-size: clamp(36px, 5.4vw, 76px); margin: 0; }
h3.display { font-size: clamp(24px, 3vw, 36px); margin: 0; }

.lede { font-size: clamp(17px, 1.5vw, 21px); color: var(--mute); max-width: 640px; line-height: 1.5; }

/* Card */
.card {
  background: var(--offwhite); border: 1px solid var(--line); border-radius: var(--r-card);
  box-shadow: var(--shadow-1);
}

/* Top ticker */
.ticker {
  position: sticky; top: 0; z-index: 50; background: var(--ink); color: var(--offwhite);
  border-bottom: 1px solid #ffffff14; overflow: hidden; height: 36px; display: flex; align-items: center;
}
.ticker-track { display: flex; gap: 56px; animation: tick 40s linear infinite; white-space: nowrap; padding-left: 28px; }
.ticker-item { display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
.ticker-item .dot { background: var(--turq); }
@keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* Nav */
.nav {
  position: sticky; top: 36px; z-index: 49; background: rgba(255,252,250,.85); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--line);
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
.logo { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 22px; letter-spacing: -0.04em; display: inline-flex; align-items: center; gap: 6px; }
.logo .glow {
  display: inline-block; width: 9px; height: 9px; border-radius: 999px; background: var(--turq);
  box-shadow: 0 0 0 4px rgba(82,196,182,.18), 0 0 18px rgba(82,196,182,.7);
}
.nav-links { display: flex; gap: 28px; font-size: 14px; font-weight: 500; }
.nav-links a { text-decoration: none; opacity: 0.75; }
.nav-links a:hover { opacity: 1; }
@media (max-width: 880px) { .nav-links { display: none; } }

/* HERO ===================================================== */
.hero { padding: 56px 0 72px; }
.hero-grid {
  display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 48px; align-items: center;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; gap: 40px; } }
.hero h1 .hl { color: var(--turq-deep); position: relative; }
.hero h1 .hl::after {
  content: ""; position: absolute; left: -2px; right: -2px; bottom: 6px; height: 14px;
  background: var(--turq); opacity: 0.22; border-radius: 4px; z-index: -1;
}
.hero-sub { margin: 28px 0 36px; max-width: 540px; font-size: 19px; color: var(--ink-soft); line-height: 1.5; }
.hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
.hero-trust {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 56px;
  padding-top: 28px; border-top: 1px solid var(--line);
}
@media (max-width: 720px) { .hero-trust { grid-template-columns: repeat(2, 1fr); } }
.trust-item { display: flex; flex-direction: column; gap: 2px; }
.trust-num { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 28px; letter-spacing: -0.03em; }
.trust-label { font-size: 12px; color: var(--mute); font-weight: 500; }

/* Machine */
.machine-stage {
  position: relative; aspect-ratio: 0.78 / 1; max-width: 460px; justify-self: center; width: 100%;
}
.stage-bg {
  position: absolute; inset: 8% -6% 8% -6%; background: var(--turq); border-radius: 24px; z-index: 0;
  background-image: radial-gradient(circle at 30% 20%, rgba(255,255,255,.18), transparent 50%);
}
.stage-bg::before {
  content: ""; position: absolute; inset: 12px; border-radius: 18px; border: 1px dashed rgba(29,29,28,.22);
}

/* Stage tags */
.stage-tag {
  position: absolute; background: var(--ink); color: var(--offwhite); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 10px; border-radius: 999px; z-index: 4;
}

/* Section 2 — concept */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }
@media (max-width: 880px) { .split { grid-template-columns: 1fr; gap: 40px; } }
.big-num { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: clamp(72px, 10vw, 144px); line-height: 0.9; letter-spacing: -0.05em; }
.market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
.stat-card { padding: 28px; border-radius: var(--r-card); border: 1px solid var(--line); background: var(--offwhite); }
.stat-card.yellow { background: var(--yellow); border-color: transparent; }
.stat-label { font-size: 13px; font-weight: 500; color: var(--mute); margin-top: 8px; }

/* Section 3 — Price */
.price-section { background: linear-gradient(180deg, var(--turq) 0%, #62cabd 100%); color: var(--ink); }
.price-card {
  background: var(--offwhite); border-radius: 28px; padding: 56px; text-align: center; max-width: 720px; margin: 40px auto 56px;
  box-shadow: var(--shadow-2); position: relative;
}
.price-amount { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: clamp(84px, 14vw, 180px); line-height: 0.95; letter-spacing: -0.05em; }
.price-strike { display: inline-flex; align-items: center; gap: 14px; font-size: 14px; color: var(--mute); margin-bottom: 12px; }
.price-strike s { color: var(--ink-soft); }
.includes-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
@media (max-width: 880px) { .includes-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .includes-grid { grid-template-columns: 1fr; } }
.include-item {
  background: var(--offwhite); border-radius: var(--r-card); padding: 22px; display: flex; gap: 14px; align-items: flex-start;
  border: 1px solid transparent; transition: border-color .2s, transform .2s;
}
.include-item:hover { border-color: var(--ink); transform: translateY(-2px); }
.include-item .icn {
  flex: 0 0 38px; height: 38px; border-radius: 10px; background: var(--turq); display: grid; place-items: center;
}
.include-num { font-family: 'Bricolage Grotesque'; font-size: 13px; color: var(--mute); font-weight: 600; }
.include-title { font-weight: 700; margin: 4px 0 4px; }
.include-desc { font-size: 13.5px; color: var(--mute); line-height: 1.45; }
.royalty-note {
  margin-top: 32px; padding: 22px 26px; background: var(--ink); color: var(--offwhite); border-radius: var(--r-card);
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}

/* Section 4 — anatomy (DARK) */
.anatomy-section { background: var(--ink); color: var(--offwhite); padding: 120px 0; }
.anatomy-section .lede { color: rgba(255,252,250,.6); }
.anatomy-stage { position: relative; max-width: 1100px; margin: 80px auto 0; aspect-ratio: 16/10; }
@media (max-width: 880px) {
  .anatomy-stage { aspect-ratio: auto; display: flex; flex-direction: column; align-items: center; gap: 0; }
  .anatomy-stage > div[style*="position: absolute"] { position: relative !important; left: auto !important; top: auto !important; transform: none !important; width: min(320px, 80%) !important; margin: 40px auto 32px; }
  .callout { position: static !important; max-width: 100% !important; text-align: center !important; padding: 14px 20px; border-bottom: 1px solid rgba(255,252,250,.1); display: flex; align-items: center; gap: 14px; text-align: left !important; }
  .callout .cnum { margin-bottom: 0; flex-shrink: 0; }
  .callout .ctitle { display: inline; }
  .callout .cdesc { display: inline; margin-top: 0; }
}
.callout {
  position: absolute; max-width: 200px; font-size: 13px; line-height: 1.4; color: var(--offwhite);
  cursor: default;
}
.callout .cnum {
  display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px;
  border-radius: 999px; background: var(--turq); color: var(--ink); font-weight: 700; font-size: 13px;
  margin-bottom: 8px;
}
.callout .ctitle { font-weight: 700; font-size: 14px; }
.callout .cdesc { color: rgba(255,252,250,.55); font-size: 12.5px; margin-top: 2px; }
.callout-line {
  position: absolute; height: 1px; background: rgba(82,196,182,.4); transform-origin: left center; pointer-events: none;
}

/* Section 5 — vs vending */
.vs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 880px) { .vs-grid { grid-template-columns: 1fr; } }
.vs-col { padding: 40px; border-radius: 24px; }
.vs-col.latte { background: linear-gradient(180deg, var(--peach) 0%, var(--yellow) 100%); }
.vs-col.vend { background: #ECECEA; color: #6B6B68; }
.vs-col h3.display { font-size: 28px; margin-bottom: 20px; }
.vs-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 14px; }
.vs-list li { display: flex; gap: 12px; align-items: flex-start; font-size: 15.5px; }
.vs-list .check { flex: 0 0 22px; height: 22px; border-radius: 999px; background: var(--ink); color: var(--offwhite); display: grid; place-items: center; font-size: 12px; }
.vs-col.vend .check { background: #B7B7B3; }

/* Section 6 — menu */
.menu-section { background: var(--ink); color: var(--offwhite); padding: 110px 0; }
.menu-section .lede { color: rgba(255,252,250,.6); }
.menu-board {
  margin-top: 48px; background:
    radial-gradient(ellipse at 30% 0%, rgba(82,196,182,.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(255,184,120,.18) 0%, transparent 60%),
    #161615;
  border: 1px solid #2a2a28; border-radius: 24px; padding: 48px; position: relative; overflow: hidden;
}
.menu-board::before {
  content: ""; position: absolute; inset: 12px; border: 1px dashed rgba(255,252,250,.08); border-radius: 16px; pointer-events: none;
}
.menu-cols { display: grid; grid-template-columns: 60px 1fr 80px 80px; gap: 12px 18px; align-items: center; }
@media (max-width: 720px) { .menu-cols { grid-template-columns: 40px 1fr 60px 60px; gap: 10px 12px; font-size: 14px; } }
.menu-cols > div { padding: 14px 0; border-bottom: 1px dashed rgba(255,252,250,.1); }
.menu-cols .head { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,252,250,.5); padding: 0 0 14px; border-bottom: 1px solid rgba(255,252,250,.18); }
.menu-cols .name { font-weight: 600; font-size: 17px; }
.menu-cols .desc { color: rgba(255,252,250,.5); font-size: 13px; margin-top: 2px; }
.menu-cols .price { text-align: right; font-family: 'Bricolage Grotesque'; font-size: 22px; font-weight: 700; }
.menu-cols .row-num { font-family: 'JetBrains Mono'; color: rgba(255,252,250,.35); font-size: 13px; }

/* Menu v2 — split M / L with cup badges */
.menu-board-v2 {
  margin-top: 48px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(82,196,182,.10) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 100%, rgba(255,184,120,.10) 0%, transparent 55%),
    #161615;
  border: 1px solid #2a2a28; border-radius: 24px; padding: 28px 12px;
  position: relative;
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
}
.menu-board-v2::before {
  content: ""; position: absolute; top: 40px; bottom: 40px; left: 50%; width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(255,252,250,.16) 18%, rgba(255,252,250,.16) 82%, transparent 100%);
}
@media (max-width: 760px) {
  .menu-board-v2 { grid-template-columns: 1fr; }
  .menu-board-v2::before { display: none; }
}
.menu-col-v2 { padding: 0 28px; display: flex; flex-direction: column; gap: 2px; }
@media (max-width: 760px) {
  .menu-col-v2 { padding: 0 8px; }
  .menu-col-v2:first-child { border-bottom: 1px solid rgba(255,252,250,.12); padding-bottom: 20px; margin-bottom: 20px; }
}

.menu-col-head {
  display: flex; align-items: center; gap: 18px; padding: 0 0 14px;
  border-bottom: 1px solid rgba(255,252,250,.18); margin-bottom: 8px;
}
.cup-badge-v2 {
  flex-shrink: 0; width: 50px; height: 58px;
  display: grid; place-items: center; position: relative;
}
.cup-badge-v2 > span {
  font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 22px; color: #1D1D1C;
  position: relative; z-index: 2;
}
.cup-badge-v2::before {
  content: ""; position: absolute; inset: 0;
  background: var(--cup-fill, #52C4B6);
  clip-path: polygon(8% 0%, 92% 0%, 80% 100%, 20% 100%);
  z-index: 1;
}
.cup-badge-v2::after {
  content: ""; position: absolute; top: 0; left: 8%; right: 8%; height: 7px;
  background: rgba(29,29,28,.85); border-radius: 3px 3px 1px 1px; z-index: 3;
}
.menu-col-title {
  font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 18px;
  letter-spacing: .14em; text-transform: uppercase; color: #FFFCFA;
}
.menu-col-sub { font-size: 13px; color: rgba(255,252,250,.55); margin-top: 4px; }

.menu-row-v2 {
  display: grid; grid-template-columns: 40px 1fr auto; gap: 14px; align-items: center;
  padding: 8px 0; border-bottom: 1px dashed rgba(255,252,250,.1); min-height: 52px;
}
.menu-row-v2:last-child { border-bottom: none; }
.cup-mini {
  width: 32px; height: 38px; position: relative; display: grid; place-items: center;
}
.cup-mini > span {
  font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 13px; color: #1D1D1C;
  position: relative; z-index: 2;
}
.cup-mini::before {
  content: ""; position: absolute; inset: 0;
  background: var(--cup-fill, #52C4B6);
  clip-path: polygon(10% 0%, 90% 0%, 78% 100%, 22% 100%);
  z-index: 1;
}
.cup-mini::after {
  content: ""; position: absolute; top: 0; left: 8%; right: 8%; height: 5px;
  background: rgba(29,29,28,.85); border-radius: 3px 3px 1px 1px; z-index: 3;
}
.menu-name-v2 { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.menu-name-v2 strong { font-size: 16px; font-weight: 600; color: #FFFCFA; letter-spacing: -0.01em; line-height: 1.2; }
.menu-name-v2 .menu-ml-v2 { font-family: 'JetBrains Mono'; font-size: 11px; color: rgba(255,252,250,.5); letter-spacing: .04em; line-height: 1.1; }
.menu-price-v2 {
  font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 22px; color: #FFFCFA;
  letter-spacing: -0.03em; line-height: 1; white-space: nowrap;
}
.menu-price-v2 small { font-size: 11px; color: rgba(255,252,250,.55); font-weight: 600; margin-left: 2px; }

/* Section 7 — calculator */
.calc-section { background: var(--yellow); color: var(--ink); }
.calc-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 32px; align-items: stretch; margin-top: 40px; }
@media (max-width: 880px) { .calc-grid { grid-template-columns: 1fr; } }
.calc-card { background: var(--offwhite); border-radius: 24px; padding: 36px; box-shadow: var(--shadow-1); }
.calc-result { background: var(--ink); color: var(--offwhite); border-radius: 24px; padding: 36px; display: flex; flex-direction: column; gap: 18px; }
.slider-row { margin-bottom: 24px; }
.slider-row label { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; margin-bottom: 12px; }
.slider-row label .v { font-family: 'Bricolage Grotesque'; font-size: 22px; font-weight: 700; }
input[type=range] {
  -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: rgba(29,29,28,.12);
  border-radius: 999px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 24px; height: 24px; background: var(--ink); border-radius: 999px;
  cursor: grab; border: 4px solid var(--turq); box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
input[type=range]::-moz-range-thumb { width: 24px; height: 24px; background: var(--ink); border-radius: 999px; cursor: grab; border: 4px solid var(--turq); }
.result-row { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,252,250,.1); }
.result-row:last-child { border-bottom: none; padding-bottom: 0; }
.result-row .lbl { font-size: 13px; color: rgba(255,252,250,.6); }
.result-row .v { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 26px; }
.result-row.profit .v { color: var(--turq); font-size: 44px; }
.disclaimer { font-size: 12px; color: var(--mute); margin-top: 20px; line-height: 1.5; }

/* Section 8 — locations */
.loc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 40px; }
@media (max-width: 880px) { .loc-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .loc-grid { grid-template-columns: 1fr; } }
.loc-card { background: var(--offwhite); border: 1px solid var(--line); border-radius: var(--r-card); padding: 24px; transition: transform .2s, border-color .2s; }
.loc-card:hover { transform: translateY(-3px); border-color: var(--ink); }
.loc-card .icn { width: 44px; height: 44px; border-radius: 12px; background: rgba(82,196,182,.16); display: grid; place-items: center; margin-bottom: 16px; }
.loc-card.featured { background: var(--turq); border-color: transparent; }
.loc-card.featured .icn { background: rgba(29,29,28,.12); }
.loc-card .ttl { font-weight: 700; font-size: 17px; }
.loc-card .meta { font-size: 13px; color: var(--mute); margin-top: 8px; }
.loc-card.featured .meta { color: rgba(29,29,28,.7); }
.loc-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 56px; padding-top: 40px; border-top: 1px solid var(--line); }
@media (max-width: 720px) { .loc-stats { grid-template-columns: repeat(2, 1fr); } }
.loc-stat .num-big { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: clamp(48px, 6vw, 72px); line-height: 1; letter-spacing: -0.04em; }
.loc-stat .lbl { font-size: 13px; color: var(--mute); margin-top: 8px; max-width: 200px; }

/* Section 9 — process */
.process-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 48px; position: relative; }
@media (max-width: 880px) { .process-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .process-grid { grid-template-columns: 1fr; } }
.step-card { background: var(--offwhite); border: 1px solid var(--line); border-radius: var(--r-card); padding: 28px; position: relative; }
.step-num { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 56px; line-height: 1; color: var(--turq); letter-spacing: -0.04em; }
.step-week { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mute); font-weight: 600; margin-top: 8px; }
.step-card h4 { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 22px; margin: 12px 0; letter-spacing: -0.02em; }
.step-card ul { padding: 0; margin: 0; list-style: none; display: flex; flex-direction: column; gap: 8px; font-size: 14px; }
.step-card li { padding-left: 16px; position: relative; color: var(--ink-soft); }
.step-card li::before { content: ""; position: absolute; left: 0; top: 9px; width: 5px; height: 5px; background: var(--turq); border-radius: 999px; }

/* Section 10 — phone */
.phone-section { background: var(--peach); }
.phone-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: center; }
@media (max-width: 880px) { .phone-grid { grid-template-columns: 1fr; gap: 40px; } }
.phone {
  background: var(--ink); border-radius: 44px; padding: 12px; box-shadow: var(--shadow-2); width: 320px; margin: 0 auto;
  border: 8px solid #0F0F0E; position: relative;
}
.phone::before { content: ""; position: absolute; top: 18px; left: 50%; transform: translateX(-50%); width: 100px; height: 24px; background: #0F0F0E; border-radius: 999px; z-index: 5; }
.phone-screen { background: var(--offwhite); border-radius: 32px; padding: 40px 18px 22px; min-height: 520px; }
.phone-feats { display: flex; flex-direction: column; gap: 14px; margin-top: 28px; }
.phone-feat { display: flex; gap: 14px; align-items: flex-start; }
.phone-feat .icn { flex: 0 0 36px; height: 36px; border-radius: 10px; background: var(--ink); color: var(--offwhite); display: grid; place-items: center; }

/* Section 11 — social proof */
.proof-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 48px; }
.proof-card.spotlight { background: var(--ink); color: var(--offwhite); border-color: transparent; grid-column: 1 / -1; display: grid; grid-template-columns: auto 1fr auto; gap: 36px; align-items: center; padding: 32px 40px; }
.proof-card.spotlight .proof-loc { gap: 18px; }
.proof-card.spotlight .avatar { width: 64px; height: 64px; font-size: 24px; }
.proof-card.spotlight .proof-rev { margin: 0; font-size: 64px; }
.proof-card.spotlight .lbl { font-size: 13px; }
@media (max-width: 720px) {
  .proof-card.spotlight { grid-template-columns: 1fr; gap: 16px; }
}
@media (max-width: 880px) { .proof-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .proof-grid { grid-template-columns: 1fr; } }
.proof-card { background: var(--offwhite); border: 1px solid var(--line); border-radius: var(--r-card); padding: 24px; transition: transform .2s; }
.proof-card:hover { transform: translateY(-3px); }
.proof-card.spotlight { background: var(--ink); color: var(--offwhite); border-color: transparent; }
.proof-card.spotlight .meta, .proof-card.spotlight .lbl { color: rgba(255,252,250,.55); }
.avatar { width: 48px; height: 48px; border-radius: 999px; display: grid; place-items: center; font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 18px; }
.proof-loc { display: flex; align-items: center; gap: 12px; }
.proof-loc .meta { font-size: 13px; color: var(--mute); }
.proof-rev { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 44px; letter-spacing: -0.04em; line-height: 1; margin: 22px 0 4px; }
.proof-card .lbl { font-size: 12px; color: var(--mute); font-weight: 500; }
.proof-bars { display: flex; gap: 6px; align-items: flex-end; height: 50px; margin-top: 18px; }
.proof-bars span { flex: 1; background: rgba(82,196,182,.3); border-radius: 4px 4px 0 0; }
.proof-card.spotlight .proof-bars span { background: rgba(82,196,182,.45); }
.proof-bars span.peak { background: var(--turq); }

/* Section 12 — why now */
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
@media (max-width: 880px) { .why-grid { grid-template-columns: 1fr; } }
.why-card {
  position: relative; padding: 36px; border-radius: var(--r-card); overflow: hidden;
  min-height: 320px; display: flex; flex-direction: column; justify-content: space-between;
  border: 1px solid var(--line);
}
.why-card.a { background: var(--turq); }
.why-card.b { background: var(--yellow); }
.why-card.c { background: var(--peach); }
.why-card .why-num { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 88px; line-height: 1; letter-spacing: -0.05em; }
.why-card h4 { font-family: 'Bricolage Grotesque'; font-weight: 700; font-size: 24px; margin: 12px 0 8px; letter-spacing: -0.02em; }
.why-card p { font-size: 14.5px; line-height: 1.5; margin: 0; }

/* FAQ */
.faq-list { margin-top: 40px; border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-q { width: 100%; background: transparent; border: none; padding: 26px 0; display: flex; justify-content: space-between; align-items: center; gap: 20px; font-family: inherit; font-size: 19px; font-weight: 700; text-align: left; color: var(--ink); }
.faq-q:hover { color: var(--turq-deep); }
.faq-toggle { width: 32px; height: 32px; border-radius: 999px; background: var(--ink); color: var(--offwhite); display: grid; place-items: center; flex-shrink: 0; transition: transform .2s; font-size: 18px; font-weight: 600; }
.faq-item.open .faq-toggle { transform: rotate(45deg); background: var(--turq); color: var(--ink); }
.faq-a { max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; color: var(--mute); font-size: 16px; line-height: 1.6; }
.faq-item.open .faq-a { max-height: 280px; padding: 0 0 26px; }

/* Final CTA */
.final-cta { background: var(--turq); padding: 110px 0; position: relative; overflow: hidden; }
.final-cta::before {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(circle at 90% 10%, rgba(255,252,156,.4), transparent 40%),
                    radial-gradient(circle at 10% 90%, rgba(255,184,120,.3), transparent 40%);
}
.final-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; position: relative; }
@media (max-width: 880px) { .final-grid { grid-template-columns: 1fr; } }
.final-cta h2.display { font-size: clamp(40px, 6vw, 88px); }
.form-card { background: var(--offwhite); border-radius: 28px; padding: 36px; box-shadow: var(--shadow-2); }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 13px; font-weight: 600; }
.field input, .field select {
  font-family: inherit; font-size: 16px; padding: 14px 16px; border: 1px solid var(--line); border-radius: 12px;
  background: #fff; outline: none; transition: border-color .2s;
}
.field input:focus, .field select:focus { border-color: var(--ink); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 560px) { .field-row { grid-template-columns: 1fr; } }
.form-foot { font-size: 12.5px; color: var(--mute); margin-top: 14px; line-height: 1.5; }

/* Footer */
footer { background: var(--ink); color: var(--offwhite); padding: 64px 0 32px; }
.foot-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 32px; margin-bottom: 40px; }
@media (max-width: 720px) { .foot-grid { grid-template-columns: 1fr 1fr; } }
.foot-col h5 { font-family: 'Bricolage Grotesque'; font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,252,250,.5); margin: 0 0 16px; font-weight: 600; }
.foot-col a { color: var(--offwhite); opacity: 0.7; text-decoration: none; display: block; padding: 6px 0; font-size: 14px; }
.foot-col a:hover { opacity: 1; color: var(--turq); }
.foot-bot { display: flex; justify-content: space-between; padding-top: 24px; border-top: 1px solid rgba(255,252,250,.1); font-size: 12px; color: rgba(255,252,250,.5); }
@media (max-width: 720px) { .foot-bot { flex-direction: column; gap: 8px; } }

/* Reveal animation */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
.reveal.in { opacity: 1; transform: none; }

/* SR only */
.sr { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
